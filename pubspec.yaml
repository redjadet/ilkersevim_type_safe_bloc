name: ilkersevim_type_safe_bloc
description: >-
  Reduce flutter_bloc boilerplate with compile-time-safe context access and
  typed selector, builder, listener, and consumer widgets.
version: 0.1.3
repository: https://github.com/redjadet/ilkersevim_type_safe_bloc
homepage: https://github.com/redjadet/ilkersevim_type_safe_bloc
issue_tracker: https://github.com/redjadet/ilkersevim_type_safe_bloc/issues
topics:
  - bloc
  - flutter
  - state-management

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
